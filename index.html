<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Digital Dialer Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

    
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #f3f4f7;
            --text: #444b54;
            --accent: #2ecc71;
            --out-shd: -8px -8px 15px rgba(255, 255, 255, 0.9), 8px 8px 15px rgba(166, 180, 200, 0.5);
            --in-shd: inset -4px -4px 8px rgba(255, 255, 255, 0.8), inset 4px 4px 8px rgba(166, 180, 200, 0.4);
        }

        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            height: 100dvh; /* Dynamic height for mobile browsers */
            display: flex;
            justify-content: center;
            align-items: center; /* Center the app to avoid cutting from bottom */
            overflow: hidden; /* Scroll disabled */
        }

        .main-app {
            width: 100%;
            max-width: 360px;
            height: 98dvh;
            background: var(--surface);
            border-radius: 40px;
            padding: 20px 15px;
            box-shadow: var(--out-shd);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #8894a5;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Tabs Navigation */
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.4);
            padding: 8px;
            border-radius: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #8894a5;
            font-size: 11px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: var(--out-shd);
        }

        /* Display Screen - FIXED (No Scroll) */
        .display-screen {
            height: 100px;
            background: var(--surface);
            box-shadow: var(--in-shd);
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            overflow: hidden;
        }

        #num-output {
            font-size: 2.2rem;
            color: var(--text);
            font-weight: 400;
            letter-spacing: 1px;
            white-space: nowrap;
            text-align: center;
            width: 100%;
            transition: font-size 0.2s;
        }

        .display-info {
            font-size: 11px;
            color: var(--accent);
            margin-top: 4px;
            height: 15px;
        }

        /* Tab Content Container */
        .tab-content-area {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 5px;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Keypad Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            justify-items: center;
        }

        .key {
            width: 72px; height: 72px;
            background: var(--surface);
            border-radius: 50%;
            box-shadow: var(--out-shd);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; border: none;
        }

        .key:active {
            box-shadow: var(--in-shd);
            transform: scale(0.94);
        }

        .key .n { font-size: 1.7rem; color: var(--text); font-weight: 500; }
        .key .c { font-size: 0.6rem; color: #a0acba; }

        /* List Items */
        .contact-item, .recent-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--surface); margin-bottom: 10px;
            border-radius: 18px; box-shadow: var(--out-shd);
        }

        .avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--accent); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin-right: 12px;
        }

        /* Actions Footer - FIXED Position */
        .footer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .call-btn {
            width: 80px; height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            border: none;
        }

        .btn-side {
            width: 55px; height: 55px;
            background: var(--surface);
            box-shadow: var(--out-shd);
            display: flex; align-items: center; justify-content: center;
            color: #8894a5; border-radius: 50%; border: none; font-size: 1.4rem;
        }

        .btn-side.active-del { color: #e74c3c; }
        .wa-color { color: #25D366; }
    </style>
</head>
<body>

    <div class="main-app">
        <div class="header">Aman Digital Pro</div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('keypad', this)">Keypad</button>
            <button class="tab-btn" onclick="switchTab('recents', this)">Recents</button>
            <button class="tab-btn" onclick="switchTab('contacts', this); fetchContacts()">Contacts</button>
            

        <div class="display-screen">
            <div id="num-output"></div>
            <div class="display-info" id="display-info"></div>
        </div>

        <div class="tab-content-area">
            <div class="tab-panel active" id="keypad">
                <div class="keypad">
                    <button class="key" onclick="addNumber('1')"><span class="n">1</span><span class="c">&nbsp;</span></button>
                    <button class="key" onclick="addNumber('2')"><span class="n">2</span><span class="c">ABC</span></button>
                    <button class="key" onclick="addNumber('3')"><span class="n">3</span><span class="c">DEF</span></button>
                    <button class="key" onclick="addNumber('4')"><span class="n">4</span><span class="c">GHI</span></button>
                    <button class="key" onclick="addNumber('5')"><span class="n">5</span><span class="c">JKL</span></button>
                    <button class="key" onclick="addNumber('6')"><span class="n">6</span><span class="c">MNO</span></button>
                    <button class="key" onclick="addNumber('7')"><span class="n">7</span><span class="c">PQRS</span></button>
                    <button class="key" onclick="addNumber('8')"><span class="n">8</span><span class="c">TUV</span></button>
                    <button class="key" onclick="addNumber('9')"><span class="n">9</span><span class="c">WXYZ</span></button>
                    <button class="key" onclick="addNumber('*')"><span class="n">*</span></button>
                    <button class="key" onclick="addNumber('0')"><span class="n">0</span><span class="c">+</span></button>
                    <button class="key" onclick="addNumber('#')"><span class="n">#</span></button>
                </div>
            </div>
            <div class="tab-panel" id="recents"><div id="recentsList"></div></div>
            <div class="tab-panel" id="contacts">
                <button onclick="saveContact()" style="width:100%; padding:12px; margin-bottom:10px; border-radius:15px; border:none; background:var(--accent); color:white; font-weight:bold;">+ Add Contact</button>
                <div id="contactsList"></div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-side wa-color" onclick="openWhatsApp()"><i class="fab fa-whatsapp"></i></button>
            <button class="call-btn" onclick="makeCall()"><i class="fas fa-phone"></i></button>
            <button class="btn-side" id="back" onclick="del()"><i class="fas fa-backspace"></i></button>
        </div>
    </div>

    <script>
        let currentNumber = '';
        let contacts = JSON.parse(localStorage.getItem('amanContacts')) || [];
        let recents = JSON.parse(localStorage.getItem('amanRecents')) || [];

        function updateUI() {
            const out = document.getElementById('num-output');
            const delBtn = document.getElementById('back');
            out.innerText = currentNumber;
            
            // Auto-fit font size to prevent scroll
            if (currentNumber.length > 12) out.style.fontSize = "1.4rem";
            else if (currentNumber.length > 9) out.style.fontSize = "1.8rem";
            else out.style.fontSize = "2.2rem";

            delBtn.classList.toggle('active-del', currentNumber.length > 0);
            
            const contact = contacts.find(c => c.number === currentNumber);
            document.getElementById('display-info').innerText = contact ? contact.name : '';
        }

        function addNumber(v) {
            if (currentNumber.length < 15) {
                currentNumber += v;
                if (navigator.vibrate) navigator.vibrate(35);
                updateUI();
            }
        }

        function del() {
            currentNumber = currentNumber.slice(0, -1);
            if (navigator.vibrate) navigator.vibrate(20);
            updateUI();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tab).classList.add('active');
            if(tab === 'contacts') renderContacts();
            if(tab === 'recents') renderRecents();
        }

        function makeCall() {
            if (!currentNumber) return;
            recents.unshift({num: currentNumber, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
            localStorage.setItem('amanRecents', JSON.stringify(recents.slice(0,20)));
            window.location.href = 'tel:' + currentNumber;
        }

        function openWhatsApp() {
            if (!currentNumber) return alert('Number dial karein!');
            let clean = currentNumber.replace(/\D/g, '');
            if (clean.length === 10) clean = '91' + clean;
            window.open(`https://wa.me/${clean}`, '_blank');
        }

        function saveContact() {
            let name = prompt("Contact Name:");
            if (name && currentNumber) {
                contacts.push({name, number: currentNumber});
                localStorage.setItem('amanContacts', JSON.stringify(contacts));
                renderContacts();
            }
        }

        function renderContacts() {
            document.getElementById('contactsList').innerHTML = contacts.map(c => `
                <div class="contact-item" onclick="currentNumber='${c.number}'; updateUI(); switchTab('keypad', document.querySelectorAll('.tab-btn')[0])">
                    <div class="avatar">${c.name[0].toUpperCase()}</div>
                    <div><div style="font-weight:600">${c.name}</div><div style="font-size:0.8rem; color:#8894a5">${c.number}</div></div>
                </div>
            `).join('') || '<p style="text-align:center; color:#a0acba; margin-top:10px;">No Contacts</p>';
        }

        function renderRecents() {
            document.getElementById('recentsList').innerHTML = recents.map(r => `
                <div class="recent-item" onclick="currentNumber='${r.num}'; updateUI(); switchTab('keypad', document.querySelectorAll('.tab-btn')[0])">
                    <div class="avatar" style="background:#8894a5"><i class="fas fa-history"></i></div>
                    <div><div style="font-weight:600">${r.num}</div><div style="font-size:0.75rem; color:#8894a5">${r.time}</div></div>
                </div>
            `).join('') || '<p style="text-align:center; color:#a0acba; margin-top:10px;">No Recents</p>';
        }
    </script>
    <script>if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Registered"))
    .catch((err) => console.log("Registration Failed", err));
    
}
</script>
            <script>async function fetchContacts() {
    // Check agar phone contacts support karta hai
    if ('contacts' in navigator && 'ContactsManager' in window) {
        try {
            const props = ['name', 'tel'];
            const opts = { multiple: true };
            const contactsList = await navigator.contacts.select(props, opts);
            
            // Contacts ko screen par dikhane ke liye
            const listDiv = document.getElementById('contactsList');
            listDiv.innerHTML = ""; // Purani list saaf karein
            
            contactsList.forEach(c => {
                const div = document.createElement('div');
                div.style = "padding:15px; margin:10px 0; background:#fff; border-radius:12px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items:center;";
                div.innerHTML = `
                    <div>
                        <div style="font-weight:bold; color:#333;">${c.name[0]}</div>
                        <div style="font-size:0.9rem; color:#666;">${c.tel[0]}</div>
                    </div>
                    <button onclick="currentNumber='${c.tel[0].replace(/\s/g, '')}'; makeCall();" 
                            style="background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:8px;">Call</button>
                `;
                listDiv.appendChild(div);
            });
        } catch (err) {
            console.log("Error: " + err);
        }
    } else {
        alert("Aapka phone direct contact access support nahi kar raha hai. Chrome browser check karein.");
    }
}
            </script>
</body>
</html>
